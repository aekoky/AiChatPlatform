_format_version: "3.0"
_transform: true

services:
  # ─── ChatService ──────────────────────────────────────────────────
  - name: chat-service
    url: http://chatserviceapi:8080
    routes:
      - name: chat-all
        paths:
          - /chat
        strip_path: true
        protocols:
          - http
          - https

  # ─── DocumentService ──────────────────────────────────────────────
  - name: document-service
    url: http://documentserviceapi:8080
    routes:
      - name: document-all
        paths:
          - /document
        strip_path: true
        protocols:
          - http
          - https

  # ─── NotificationService (SignalR) ───────────────────────────────────────────
  - name: notification-service
    url: http://notificationserviceapi:8080
    routes:
      - name: signalr-route
        paths:
          - /hubs/chat
        strip_path: false
        protocols:
          - http
          - https

  # ─── Angular SPA — catch-all (lowest priority, shortest path) ────────────────
  # Kong routes by path specificity — longer paths above always win first
  # No CORS needed — SPA and API share the same origin (localhost:8000)
  - name: web-client
    url: http://webclient:3000
    routes:
      - name: spa-route
        paths:
          - /
        strip_path: false
        protocols:
          - http
          - https
