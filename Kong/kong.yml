_format_version: "3.0"
_transform: true

services:
  # ─── ChatService API ──────────────────────────────────────────────────────────
  - name: chat-service
    url: http://chatserviceapi:8080
    routes:
      - name: chat-routes
        paths:
          - /api/Chat
        strip_path: false
        protocols:
          - http
          - https

  # ─── ChatService Docs ─────────────────────────────────────────────────────────
  - name: chat-service-docs
    url: http://chatserviceapi:8080
    routes:
      - name: scalar-route
        paths:
          - /scalar
        strip_path: false
        protocols:
          - http
          - https
      - name: swagger-route
        paths:
          - /swagger
        strip_path: false
        protocols:
          - http
          - https
      - name: openapi-route
        paths:
          - /openapi/v1.json
        strip_path: false
        protocols:
          - http
          - https

  # ─── NotificationService (SignalR) ───────────────────────────────────────────
  - name: notification-service
    url: http://notificationserviceapi:8080
    routes:
      - name: signalr-route
        paths:
          - /hubs/chat
        strip_path: false
        protocols:
          - http
          - https

  # ─── Angular SPA — catch-all (lowest priority, shortest path) ────────────────
  # Kong routes by path specificity — longer paths above always win first
  # No CORS needed — SPA and API share the same origin (localhost:8000)
  - name: web-client
    url: http://webclient:3000
    routes:
      - name: spa-route
        paths:
          - /
        strip_path: false
        protocols:
          - http
          - https
