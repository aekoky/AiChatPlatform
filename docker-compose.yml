services:
  kong:
    image: kong:3.6-ubuntu
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    ports:
      - "8000:8000"   # single entry point for everything
      - "8001:8001"   # admin API — internal use only
    volumes:
      - ./Kong/kong.yml:/kong/kong.yml:ro
    depends_on:
      chatserviceapi:
        condition: service_started
      notificationserviceapi:
        condition: service_started
      webclient:
        condition: service_started
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - app-network

  chatserviceapi:
    image: ${DOCKER_REGISTRY-}chatserviceapi
    build:
      context: .
      dockerfile: ChatService/ChatService.Api/Dockerfile
    expose:
      - "8080"   # internal only — Kong routes to it
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network

  documentserviceapi:
    image: ${DOCKER_REGISTRY-}documentserviceapi
    build:
      context: .
      dockerfile: DocumentService/DocumentService.Api/Dockerfile
    expose:
      - "8080"   # internal only — Kong routes to it
    depends_on:
      minio-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - app-network

  documentingestionworker:
    image: ${DOCKER_REGISTRY-}documentingestionworker
    build:
      context: .
      dockerfile: DocumentIngestion/DocumentIngestion.Worker/Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      ollama-pull:
        condition: service_completed_successfully
    networks:
      - app-network

  notificationserviceapi:
    image: ${DOCKER_REGISTRY-}notificationserviceapi
    build:
      context: .
      dockerfile: NotificationService/NotificationService.Api/Dockerfile
    expose:
      - "8080"   # internal only — Kong routes to it
    depends_on:
      keycloak:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network

  aiserviceworker:
    image: ${DOCKER_REGISTRY-}aiserviceworker
    build:
      context: .
      dockerfile: AiService/AiService.Worker/Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    networks:
      - app-network

  webclient:
    image: ${DOCKER_REGISTRY-}webclient
    build:
      context: ./WebClient
      dockerfile: Dockerfile
    expose:
      - "3000"   # internal only — Kong routes to it, no direct host access
    depends_on:
      keycloak:
        condition: service_healthy
    networks:
      - app-network

  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_MULTIPLE_DATABASES: aichat,keycloak,documents
      POSTGRES_PGSTORE_DATABASE: documents
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Postgres/init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh:ro
      - ./Postgres/rag-schema.sql:/scripts/rag-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
      - "9000:9000"
    volumes:
      - ./Keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "{ printf 'HEAD /health/ready HTTP/1.0\\r\\n\\r\\n' >&0; grep 'HTTP/1.0 200'; } 0<>/dev/tcp/localhost/9000"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - app-network

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./RabbitMQ/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./RabbitMQ/rabbitmq-definitions.json:/etc/rabbitmq/definitions.json:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app-network

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 30s
      retries: 5
      start_period: 10s
    networks:
      - app-network

  ollama-pull:
    image: ollama/ollama:latest
    entrypoint: ["/bin/sh", "-c", "ollama pull llama3 && ollama pull llama3:instruct && ollama pull nomic-embed-text"]
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ollama_data:/root/.ollama
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - app-network

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9002:9000"   # S3 API
      - "9001:9001"   # MinIO console
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network

  minio-init:
    image: minio/mc:latest
    entrypoint: ["/bin/sh", "-c", "mc alias set local http://minio:9000 minioadmin minioadmin && mc mb local/documents --ignore-existing"]
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - app-network

volumes:
  postgres_data:
  rabbitmq_data:
  ollama_data:
  minio_data:

networks:
  app-network:
    driver: bridge
